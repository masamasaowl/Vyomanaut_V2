version: "2"

run:
  timeout: 5m

linters:
  enable:
    - govet
    - errcheck
    - exhaustive
    - mnd
  settings:
    exhaustive:
    # Types added here as they are defined in subsequent milestones.
    # Format: <package_import_path>.<TypeName>
    # M7: internal/audit.AuditResult
    # M9: internal/repair.Priority, internal/repair.TriggerType
    # M10: internal/payment.EscrowEventType
      default-signifies-exhaustive: false
    errcheck:
      check-type-assertions: true
    mnd:
      ignored-functions:
        - "argon2.IDKey"
  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - mnd
      - path: "internal/config/profiles\\.go"
        linters:
          - mnd

formatters:
  enable:
    - gofmt